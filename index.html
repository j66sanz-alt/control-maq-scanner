<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ESCANER CONTROL MAQ</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --bg: #111827;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #166534;
      --primary-dark: #14532d;
      --danger: #b91c1c;
      --warn: #92400e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 14px;
    }

    .card {
      background: var(--panel);
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 24px;
      line-height: 1.15;
      text-align: center;
    }

    .status {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      text-align: center;
    }

    .tool {
      margin: 16px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fafb;
      text-align: left;
    }

    .tool-id {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .tool-model {
      font-size: 23px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tool-desc {
      margin-top: 8px;
      color: #374151;
      font-size: 15px;
      line-height: 1.35;
    }

    button, select, input {
      width: 100%;
      min-height: 52px;
      border-radius: 8px;
      font-size: 18px;
    }

    button {
      border: 0;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:active { background: var(--primary-dark); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .secondary { background: #374151; }
    .danger { background: var(--danger); }

    select, input {
      margin: 8px 0;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: white;
      color: var(--text);
    }

    label {
      display: block;
      margin-top: 12px;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
    }

    #reader {
      width: 100%;
      margin: 12px auto 0;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #000;
    }

    .hidden { display: none; }
    .error { color: var(--danger); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" id="app">
      <h1>ESCANER CONTROL MAQ</h1>
      <p class="status">Cargando...</p>
    </section>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwisapdk1AeW6U9bezPfwqyNjnvSHO9MZx6quE0DrebCw3dbwX0ND2hcaoonemnjejp/exec";

    const STORAGE = {
      token: "control_maq_token_dispositivo",
      encargado: "control_maq_id_encargado",
      alias: "control_maq_alias_dispositivo",
      lastId: "control_maq_last_id",
      lastTs: "control_maq_last_ts"
    };

    let html5Qr = null;
    let scannerState = "stopped";
    let currentTool = null;
    let encargadosCache = [];
    // NUEVO: referencia al temporizador de auto-reinicio del escaner
    let autoRestartTimer = null;

    window.addEventListener("load", boot);

    function boot() {
      ensureDeviceToken();
      const initialId = getInitialToolId();

      if (!getEncargado()) {
        showIdentity(initialId);
        return;
      }

      if (initialId) {
        loadTool(initialId);
        return;
      }

      showScannerStart();
    }

    function getInitialToolId() {
      const params = new URLSearchParams(window.location.search);
      return cleanId(params.get("eina") || params.get("id") || "");
    }

    function showIdentity(nextToolId) {
      render(`
        <h1>Identifica este movil</h1>
        <p class="status">Selecciona quien usa este dispositivo.</p>
        <label for="encargado">Encargado</label>
        <select id="encargado" disabled>
          <option>Cargando...</option>
        </select>
        <label for="alias">Nombre del movil</label>
        <input id="alias" autocomplete="off" value="Movil CONTROL MAQ">
        <button id="saveIdentity" disabled>GUARDAR</button>
      `);

      api({ api: "getEncarregats" }, function (res) {
        if (!res || !res.ok || !Array.isArray(res.encarregats) || !res.encarregats.length) {
          showError("No se han podido cargar encargados", res && res.error ? res.error : "");
          return;
        }

        encargadosCache = res.encarregats;
        const select = document.getElementById("encargado");
        select.innerHTML = encargadosCache.map(function (e) {
          return `<option value="${escapeAttr(e.id)}">${escapeHtml(e.nom)}</option>`;
        }).join("");
        select.disabled = false;

        const btn = document.getElementById("saveIdentity");
        btn.disabled = false;
        btn.onclick = function () {
          const id = select.value;
          const alias = document.getElementById("alias").value.trim() || ("Movil " + id);
          localStorage.setItem(STORAGE.encargado, id);
          localStorage.setItem(STORAGE.alias, alias);

          if (nextToolId) loadTool(nextToolId);
          else showScannerStart();
        };
      });
    }

    // NUEVO: cancela cualquier auto-reinicio pendiente del escaner
    function clearAutoRestart() {
      if (autoRestartTimer) {
        clearTimeout(autoRestartTimer);
        autoRestartTimer = null;
      }
    }

    function showScannerStart(message) {
      clearAutoRestart();
      currentTool = null;
      clearUrl();
      render(`
        <h1>ESCANER CONTROL MAQ</h1>
        <p class="status">${escapeHtml(message || "Escanea una herramienta.")}</p>
        <button id="startScan">INICIAR ESCANER</button>
      `);
      document.getElementById("startScan").onclick = startScanner;
    }

    function startScanner() {
      // NUEVO: cancela cualquier reinicio automatico pendiente antes de arrancar
      clearAutoRestart();

      // NUEVO: evita arrancar dos escaneres a la vez (causa del bloqueo de camara)
      if (scannerState === "starting" || scannerState === "running") {
        return;
      }

      currentTool = null;
      render(`
        <h1>ESCANER CONTROL MAQ</h1>
        <div id="reader"></div>
        <p class="status">Apunta la camara al QR de una herramienta.</p>
      `);

      if (!window.Html5Qrcode) {
        showError("No se ha cargado el lector QR", "Revisa la conexion del movil.");
        return;
      }

      html5Qr = new Html5Qrcode("reader");
      scannerState = "starting";

      html5Qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onQrDecoded,
        function () {}
      ).then(function () {
        scannerState = "running";
      }).catch(function (err) {
        scannerState = "stopped";
        html5Qr = null;
        showCameraError(err);
      });
    }

    function onQrDecoded(decodedText) {
      if (scannerState !== "running") return;

      const id = extractToolId(decodedText);
      if (!id || isRecentDuplicate(id)) return;

      scannerState = "processing";
      stopScanner(function () {
        loadTool(id);
      });
    }

    function loadTool(id) {
      clearAutoRestart();
      const clean = cleanId(id);
      if (!clean) {
        showScannerStart("QR sin identificador de herramienta.");
        return;
      }

      render(`
        <h1>Herramienta detectada</h1>
        <p class="status">Consultando datos...</p>
      `);

      api({ api: "getEinaInfo", eina: clean }, function (res) {
        if (!res || !res.ok) {
          showError(
            res && res.titol ? res.titol : "Herramienta no encontrada",
            "ID: " + clean
          );
          return;
        }

        currentTool = res;
        showConfirm();
      });
    }

    function showConfirm() {
      clearAutoRestart();
      render(`
        <h1>Herramienta detectada</h1>
        <div class="tool">
          <div class="tool-id">ID ${escapeHtml(currentTool.id_eina)}</div>
          <div class="tool-model">${escapeHtml(currentTool.model || "Sin modelo")}</div>
          <div class="tool-desc">${escapeHtml(currentTool.descripcion || "")}</div>
        </div>
        <button id="confirm">CONFIRMAR</button>
        <button class="secondary" id="cancel">CANCELAR</button>
      `);

      document.getElementById("confirm").onclick = confirmTool;
      document.getElementById("cancel").onclick = resumeOrStartScanner;
    }

    function confirmTool() {
      if (!currentTool) return;

      const btn = document.getElementById("confirm");
      btn.disabled = true;
      btn.textContent = "REGISTRANDO...";

      api({
        api: "registrarEscaneig",
        eina: currentTool.id_eina,
        encarregat: getEncargado(),
        token: ensureDeviceToken(),
        alias: getAlias()
      }, function (res) {
        if (!res || !res.ok) {
          showError(res && res.titol ? res.titol : "Error de registro", res && res.error ? res.error : "");
          return;
        }

        markRecent(currentTool.id_eina);
        showRegistered();
      });
    }

    function showRegistered() {
      // NUEVO: por seguridad, cancela cualquier temporizador previo antes de crear uno nuevo
      clearAutoRestart();

      const model = currentTool && currentTool.model ? currentTool.model : "";
      render(`
        <h1>REGISTRADO</h1>
        <div class="tool">
          <div class="tool-model">${escapeHtml(model)}</div>
        </div>
        <p class="status">Preparando siguiente escaneo...</p>
        <button id="scanAgain">ESCANEAR OTRA VEZ</button>
      `);

      // NUEVO: el boton manual cancela el temporizador automatico antes de arrancar
      document.getElementById("scanAgain").onclick = function () {
        clearAutoRestart();
        startScanner();
      };

      autoRestartTimer = setTimeout(function () {
        autoRestartTimer = null;
        startScanner();
      }, 900); // NUEVO: 900ms en vez de 600ms, mas margen para liberar la camara
    }

    function resumeOrStartScanner(silent) {
      clearAutoRestart();
      currentTool = null;
      clearUrl();

      if (silent === true) {
        startScanner();
        return;
      }

      showScannerStart();
    }

    function stopScanner(callback) {
      const scanner = html5Qr;
      html5Qr = null;

      if (!scanner) {
        scannerState = "stopped";
        if (callback) callback();
        return;
      }

      scanner.stop().then(function () {
        try {
          scanner.clear();
        } catch (err) {}
        scannerState = "stopped";
        if (callback) callback();
      }).catch(function () {
        scannerState = "stopped";
        if (callback) callback();
      });
    }

    function showCameraError(err) {
      clearAutoRestart();
      const detail = err && err.message ? err.message : String(err || "");
      render(`
        <h1 class="error">No se ha podido abrir la camara</h1>
        <p class="status">${escapeHtml(detail)}</p>
        <button id="retry">ESCANEAR OTRA VEZ</button>
      `);
      document.getElementById("retry").onclick = startScanner;
    }

    function showError(title, detail) {
      clearAutoRestart();
      render(`
        <h1 class="error">${escapeHtml(title)}</h1>
        <p class="status">${escapeHtml(detail || "")}</p>
        <button id="again">ESCANEAR OTRA VEZ</button>
      `);
      document.getElementById("again").onclick = showScannerStart;
    }

    function api(params, callback) {
      const cbName = "controlMaqCb_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      params.callback = cbName;

      const query = Object.keys(params).map(function (key) {
        return encodeURIComponent(key) + "=" + encodeURIComponent(params[key]);
      }).join("&");

      const script = document.createElement("script");
      const timeout = setTimeout(function () {
        cleanup();
        showError("Error conectando con CONTROL MAQ", "Tiempo de espera agotado.");
      }, 15000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[cbName] = function (data) {
        cleanup();
        callback(data);
      };

      script.onerror = function () {
        cleanup();
        showError("Error conectando con CONTROL MAQ", "No se ha podido contactar con Apps Script.");
      };

      script.src = API_URL + "?" + query;
      document.body.appendChild(script);
    }

    function extractToolId(text) {
      const raw = String(text || "").trim();
      if (!raw) return "";

      try {
        const url = new URL(raw);
        return cleanId(url.searchParams.get("eina") || url.searchParams.get("id") || "");
      } catch (err) {}

      const match = raw.match(/\d{3,}/);
      return match ? cleanId(match[0]) : "";
    }

    function cleanId(value) {
      let text = String(value || "").trim();
      if (/^\d+\.0$/.test(text)) text = text.slice(0, -2);
      return text;
    }

    function ensureDeviceToken() {
      let token = localStorage.getItem(STORAGE.token);
      if (!token) {
        token = "MOB-" + (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + "-" + Math.random().toString(36).slice(2));
        localStorage.setItem(STORAGE.token, token);
      }
      return token;
    }

    function getEncargado() {
      return localStorage.getItem(STORAGE.encargado) || "";
    }

    function getAlias() {
      return localStorage.getItem(STORAGE.alias) || ("Movil " + getEncargado());
    }

    function markRecent(id) {
      localStorage.setItem(STORAGE.lastId, cleanId(id));
      localStorage.setItem(STORAGE.lastTs, String(Date.now()));
    }

    function isRecentDuplicate(id) {
      const lastId = cleanId(localStorage.getItem(STORAGE.lastId) || "");
      const lastTs = Number(localStorage.getItem(STORAGE.lastTs) || "0");
      return cleanId(id) === lastId && Date.now() - lastTs < 2500;
    }

    function clearUrl() {
      if (window.location.search) {
        history.replaceState(null, "", window.location.pathname);
      }
    }

    function render(html) {
      document.getElementById("app").innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }
  </script>
</body>
</html>
